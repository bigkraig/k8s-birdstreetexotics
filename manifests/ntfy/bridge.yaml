# alertmanager-ntfy — bridges warbler Alertmanager webhooks → warbler ntfy (Phase 7 5c-2).
# Alertmanager POSTs to :8000/hook; the bridge formats + publishes to the in-cluster ntfy
# (http://ntfy/alerts) using seakitteh's token. The token is injected from the ntfy-bridge-token
# secret by an init container (the bridge has no env-var expansion), so no credential is in git.
---
apiVersion: v1
kind: ConfigMap
metadata: { name: alertmanager-ntfy-config, namespace: monitoring }
data:
  config.yml.tmpl: |
    http:
      addr: :8000
    ntfy:
      baseurl: http://ntfy.monitoring.svc.cluster.local
      auth:
        token: "__NTFY_TOKEN__"
      notification:
        topic: alerts
        priority: |
          status == "firing" ? "high" : "default"
        tags:
          - tag: rotating_light
            condition: status == "firing"
          - tag: white_check_mark
            condition: status == "resolved"
        templates:
          title: |
            {{ if eq .Status "resolved" }}Resolved: {{ end }}{{ index .Annotations "summary" }}
          description: |
            {{ index .Annotations "description" }}
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: alertmanager-ntfy, namespace: monitoring }
spec:
  replicas: 1
  selector: { matchLabels: { app: alertmanager-ntfy } }
  template:
    metadata: { labels: { app: alertmanager-ntfy } }
    spec:
      initContainers:
        - name: render-config
          image: busybox:1.36
          command: ["sh","-c","sed \"s|__NTFY_TOKEN__|$NTFY_TOKEN|\" /tmpl/config.yml.tmpl > /config/config.yml"]
          env:
            - name: NTFY_TOKEN
              valueFrom: { secretKeyRef: { name: ntfy-bridge-token, key: token } }
          volumeMounts:
            - { name: tmpl,   mountPath: /tmpl }
            - { name: config, mountPath: /config }
      containers:
        - name: alertmanager-ntfy
          image: ghcr.io/alexbakker/alertmanager-ntfy:latest@sha256:2a862f23c8fb67f777824979487c06a417b2f9bbbc2eb45a974a1fb45b9bbff3
          args: ["--configs", "/config/config.yml"]
          ports: [{ name: http, containerPort: 8000 }]
          volumeMounts:
            - { name: config, mountPath: /config }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { memory: 64Mi }
      volumes:
        - { name: tmpl,   configMap: { name: alertmanager-ntfy-config } }
        - { name: config, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: alertmanager-ntfy, namespace: monitoring }
spec:
  selector: { app: alertmanager-ntfy }
  ports: [{ name: http, port: 8000, targetPort: http }]

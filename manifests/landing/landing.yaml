# Bird Street Exotics landing page — https://birdstreetexotics.com (+ www).
# Static placeholder: nginx serving an HTML page from a ConfigMap. PUBLIC (ungated) —
# no forward-auth middleware. Kata microVM like every other tenant workload.
#
# TLS: Traefik's DEFAULT cert is *.warbler.haus, so this domain must name its own
# secret. The cert `birdstreetexotics-wildcard-tls` is issued by the ROOT cluster's
# cert-manager into the HOST tenant namespace `birdstreetexotics` (where vcluster
# single-namespace-syncs every object in this vcluster). vcluster passes through a
# tls.secretName it doesn't manage, so the synced Ingress resolves it host-side and
# Traefik serves the real LE cert by SNI.
---
apiVersion: v1
kind: Namespace
metadata: { name: landing }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-html
  namespace: landing
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Bird Street Exotics</title>
      <meta name="description" content="Bird Street Exotics — coming soon.">
      <style>
        :root { color-scheme: dark; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
          font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          background: radial-gradient(1200px 600px at 50% -10%, #1a1d24 0%, #0b0c0f 60%);
          color: #e8e8ea;
          display: flex; align-items: center; justify-content: center;
          text-align: center; padding: 2rem;
        }
        .wrap { max-width: 40rem; }
        .kicker {
          text-transform: uppercase; letter-spacing: 0.35em; font-size: 0.72rem;
          color: #9aa0aa; margin-bottom: 1.5rem;
        }
        h1 {
          font-size: clamp(2.2rem, 7vw, 4rem); font-weight: 700; line-height: 1.05;
          letter-spacing: -0.02em; margin-bottom: 1.1rem;
        }
        h1 .accent { color: #c9a15a; }
        p.lede { font-size: clamp(1rem, 2.5vw, 1.2rem); color: #b6bac2; line-height: 1.6; }
        .rule { width: 3rem; height: 2px; background: #c9a15a; margin: 2rem auto; opacity: 0.8; }
        a.contact { color: #e8e8ea; text-decoration: none; border-bottom: 1px solid #c9a15a55; padding-bottom: 2px; }
        a.contact:hover { border-color: #c9a15a; }
        footer { margin-top: 2.5rem; font-size: 0.8rem; color: #6b7079; }
      </style>
    </head>
    <body>
      <main class="wrap">
        <div class="kicker">Bird Street Exotics</div>
        <h1>Something <span class="accent">exceptional</span><br>is on its way.</h1>
        <div class="rule"></div>
        <p class="lede">Our new home is under construction. For inquiries, reach us at
          <a class="contact" href="mailto:kraig@birdstreetexotics.com">kraig@birdstreetexotics.com</a>.</p>
        <footer>&copy; Bird Street Exotics</footer>
      </main>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: landing
spec:
  replicas: 2                       # static page, no state → run 2 for zero-downtime rollouts
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app: landing }
  template:
    metadata:
      labels: { app: landing }
    spec:
      runtimeClassName: kata
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: html, mountPath: /usr/share/nginx/html, readOnly: true }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { memory: 128Mi }
      volumes:
        - name: html
          configMap: { name: landing-html }
---
apiVersion: v1
kind: Service
metadata:
  name: landing
  namespace: landing
spec:
  selector: { app: landing }
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing
  namespace: landing
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "1000"
spec:
  ingressClassName: traefik
  tls:
    - hosts: [birdstreetexotics.com, www.birdstreetexotics.com]
      secretName: birdstreetexotics-wildcard-tls   # issued by root cert-manager into host ns `landing`
  rules:
    - host: birdstreetexotics.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: landing, port: { number: 80 } } }
    - host: www.birdstreetexotics.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: landing, port: { number: 80 } } }

# Pocket ID: OIDC/passkey identity provider for birdstreetexotics.
# State on ssd-block (NVMe mirror). Exposed at https://id.birdstreetexotics.com via a
# standard Ingress the vcluster syncs to root Traefik. Unlike warbler (default cert),
# this domain names its own cert (birdstreetexotics-wildcard-tls, issued by root
# cert-manager into the host tenant ns). Passkeys REQUIRE real HTTPS at this host.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocket-id-data
  namespace: pocket-id
spec:
  storageClassName: ssd-block
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  replicas: 1
  strategy:
    type: Recreate            # single RWO volume — don't run two at once
  selector:
    matchLabels:
      app: pocket-id
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2
          ports:
            - containerPort: 1411
          env:
            - name: APP_URL
              value: https://id.birdstreetexotics.com   # OIDC issuer + WebAuthn RP origin
            - name: TRUST_PROXY
              value: "true"                              # behind Traefik
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secrets
                  key: encryption-key
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            tcpSocket:
              port: 1411
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pocket-id-data
---
apiVersion: v1
kind: Service
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  selector:
    app: pocket-id
  ports:
    - name: http
      port: 1411
      targetPort: 1411
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pocket-id
  namespace: pocket-id
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "1000"
spec:
  ingressClassName: traefik
  tls:
    - hosts: [id.birdstreetexotics.com]
      secretName: birdstreetexotics-wildcard-tls
  rules:
    - host: id.birdstreetexotics.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pocket-id
                port:
                  number: 1411

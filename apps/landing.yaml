# Landing page for birdstreetexotics.com (static nginx). Public, ungated.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: landing
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:bigkraig/k8s-birdstreetexotics.git
    targetRevision: main
    path: manifests/landing
  destination:
    server: https://kubernetes.default.svc
    namespace: landing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Logo ConfigMap's base64 exceeds the 256KB client-side last-applied-config
      # annotation limit; server-side apply stores no such annotation.
      - ServerSideApply=true

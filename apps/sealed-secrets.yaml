# Sealed Secrets controller — the tenant's git-native secret store.
# Its keypair is auto-generated inside THIS vcluster (nothing imperative to create,
# key stays tenant-owned). Encrypt with `kubeseal` -> commit the SealedSecret ->
# Argo applies it -> controller mints the real Secret. BACK UP the controller key
# (secret sealed-secrets-key* in kube-system).
#
# Vendored release manifest (manifests/sealed-secrets/controller.yaml) rather than a
# helm chart — the Bitnami helm repo returns 404.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:bigkraig/k8s-birdstreetexotics.git
    targetRevision: main
    path: manifests/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true       # big CRD -> avoid client-side apply annotation limit
